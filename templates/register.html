<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StealthGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/landing.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .auth-card {
            background: rgba(18, 22, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s ease;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: var(--text-muted);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00e68a;
            box-shadow: 0 0 0 4px rgba(0, 230, 138, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #00e68a;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 230, 138, 0.4);
        }
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: #00e68a;
            text-decoration: none;
            font-weight: 600;
        }
        .error-msg {
            background: rgba(255, 51, 102, 0.1);
            color: #ff3366;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 51, 102, 0.2);
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">🛡️</div>
                <h1>Request Access</h1>
                <p>Register a new operative account.</p>
            </div>
            
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="username">Agent ID (Username)</label>
                    <input type="text" id="username" name="username" required placeholder="agent_007">
                </div>
                <div class="form-group">
                    <label for="email">Secure Comm (Email)</label>
                    <input type="email" id="email" name="email" required placeholder="agent@mi6.gov">
                </div>
                <div class="form-group">
                    <label for="password">Master Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have clearance? <a href="{{ url_for('login') }}">Login Here</a>
            </div>
        </div>
    </div>
</body>
</html>
